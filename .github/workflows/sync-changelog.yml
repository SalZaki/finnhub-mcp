name: Sync CHANGELOG to main

# Backports CHANGELOG.md and .release-please-manifest.json from `release`
# to `main` whenever release-please updates them on the release branch.
#
# Why this workflow exists:
#   In the gated release model, release-please runs on the `release` branch
#   and writes the changelog/manifest commits there. Without this workflow,
#   `main`'s CHANGELOG.md drifts behind every release — readers landing on
#   main see stale release notes, and the manifest version trails reality.
#
# Trigger:
#   Fires only when CHANGELOG.md or the manifest file actually changes on
#   `release` — so promotion-PR merges (which don't touch those files)
#   don't open empty backport PRs.
#
# Idempotent:
#   Uses a fixed branch name. Force-pushes update an in-flight backport PR
#   rather than stacking duplicates.

on:
  push:
    branches: [release]
    paths:
      - 'CHANGELOG.md'
      - '.release-please-manifest.json'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: 📋 Backport CHANGELOG + manifest to main
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Copy CHANGELOG and manifest from release
        run: |
          git fetch origin release
          git checkout origin/release -- CHANGELOG.md .release-please-manifest.json

      - name: 🔎 Bail if nothing to backport
        id: diff
        run: |
          if git diff --quiet HEAD; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "Already in sync — nothing to backport."
          else
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🌿 Push backport branch
        if: steps.diff.outputs.no_changes == 'false'
        env:
          BRANCH: sync/changelog-from-release
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add CHANGELOG.md .release-please-manifest.json
          git commit -m "chore: sync CHANGELOG and manifest from release to main"
          git push -f origin "$BRANCH"

      - name: 🪄 Open or refresh backport PR
        if: steps.diff.outputs.no_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: sync/changelog-from-release
        run: |
          existing=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "Backport PR #$existing already open — branch force-push refreshed it."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: sync CHANGELOG and manifest from release to main" \
              --body "Automatic backport opened by \`sync-changelog.yml\` after release-please updated the changelog on \`release\`. Merging this catches \`main\` up so contributors reading the file there see current release notes. No code changes, no version bump — just \`CHANGELOG.md\` and \`.release-please-manifest.json\`."
          fi
