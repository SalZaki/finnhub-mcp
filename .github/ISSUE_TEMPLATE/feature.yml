name: Feature
description: A discrete capability that delivers user or system value. Belongs to one Epic and is composed of one or more User Stories.
title: "[Feature] <short title>"
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for **Features** — discrete capabilities that deliver value end-to-end. A Feature usually maps to one or two PRs and one or more User Stories.

        - A Feature must have a parent Epic.
        - Acceptance criteria here are Feature-level (the whole capability). Story-level criteria live on individual User Story issues.
        - Link this Feature to its Epic via the `Sub-issues` panel on the Epic, and include `Parent Epic: #N` in the body below.

        Hierarchy: **Epic → Feature → User Story → Sub-task**. See [`docs/ISSUE_WORKFLOW.md`](../blob/main/docs/ISSUE_WORKFLOW.md).
  - type: input
    id: parent-epic
    attributes:
      label: Parent Epic
      description: Issue number of the parent Epic.
      placeholder: "#N"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One to two paragraphs. What does this Feature deliver and why?
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Testable conditions that must hold for the Feature to be considered done. Use Given/When/Then or numbered assertions. Avoid "robust", "seamless", "intuitive".
      value: |
        - [ ] Criterion 1 (testable assertion)
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true
  - type: textarea
    id: definition-of-done
    attributes:
      label: Definition of done
      description: Engineering completeness gate, separate from functional acceptance.
      value: |
        - [ ] All child User Stories closed
        - [ ] Unit tests cover the new code paths
        - [ ] `dotnet test --settings coverlet.runsettings` passes; coverage does not regress below floor
        - [ ] `dotnet format --verify-no-changes` clean
        - [ ] README "Currently Available" updated (if user-visible)
        - [ ] CHANGELOG entry generated by release-please (via Conventional Commits)
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Technical scope
      description: Files / modules / boundaries touched. Reference existing patterns where applicable.
    validations:
      required: false
  - type: input
    id: dependencies
    attributes:
      label: Dependencies
      description: "Format: `Blocks: #N, Blocked by: #N`."
      placeholder: "Blocks: #N, Blocked by: #N"
    validations:
      required: false
  - type: dropdown
    id: estimate
    attributes:
      label: Estimate
      description: S = ≤1 day, M = 1–3 days, L = 3–5+ days. One contributor.
      options:
        - S
        - M
        - L
      default: 1
    validations:
      required: true
